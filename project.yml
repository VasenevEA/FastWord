name: FastWord
options:
  bundleIdPrefix: com.fastword
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES
targets:
  FastWord:
    type: application
    platform: macOS
    sources:
      - FastWord/Sources
      - FastWord/Resources
    info:
      path: FastWord/Resources/Info.plist
      properties:
        LSUIElement: true
        NSMicrophoneUsageDescription: FastWord needs microphone access to transcribe your voice.
        NSAppleEventsUsageDescription: FastWord uses input events to paste transcribed text.
        CFBundleName: FastWord
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
    entitlements:
      path: FastWord/Resources/FastWord.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fastword.app
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: NO
